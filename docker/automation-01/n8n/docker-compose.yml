services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - TZ=America/Santo_Domingo
      - GENERIC_TIMEZONE=America/Santo_Domingo
      - N8N_SECURE_COOKIE=false
      - N8N_HOST=10.0.0.67
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_RESTRICT_FILE_ACCESS_TO=/home/node/.n8n,/tmp
    volumes:
      - /opt/stacks/n8n/n8n_data:/home/node/.n8n
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
