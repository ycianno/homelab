services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - '3080:8080'
    environment:
      - OLLAMA_BASE_URL=http://10.0.0.72:11434
    volumes:
      - ./open-webui_data:/app/backend/data
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
